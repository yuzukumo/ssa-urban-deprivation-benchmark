name: pytorch
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - numpy=2.4.3
  - pandas=3.0.2
  - pyyaml=6.0.3
  - requests=2.33.1
  - matplotlib=3.10.8
  - scikit-learn=1.8.0
  - geopandas=1.1.3
  - pyogrio=0.11.1
  - pyproj=3.7.2
  - shapely=2.1.2
  - osmnx=2.1.0
  - rasterio=1.5.0
  - rasterstats=0.20.0
  - esda=2.9.0
  - libpysal=4.14.1
  - pytest=9.0.3
  - xgboost=3.2.0
  - pip
  - pip:
      - torch==2.11.0
      - torchvision==0.26.0
      - -e .
